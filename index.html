<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relay</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#080808; font-family:'DM Sans',sans-serif; }
    ::-webkit-scrollbar { width:0; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
    @keyframes pulse { 0%,100%{opacity:1;}50%{opacity:0.4;} }
    .fu{animation:fadeUp 0.3s ease forwards;}
    .pd{animation:pulse 2s infinite;}
    input:focus,textarea:focus{border-color:#C8A97E!important;outline:none;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

const CONNECTORS = [
  {id:1,name:"Sophia Chen",role:"Partner @ Sequoia",domain:"Venture / SaaS",score:97,intros:34,avatar:"SC",color:"#C8A97E"},
  {id:2,name:"Marcus Leblanc",role:"VP Sales @ Salesforce",domain:"Enterprise / BD",score:91,intros:28,avatar:"ML",color:"#8AAFC8"},
  {id:3,name:"Anika Patel",role:"CTO @ Stripe",domain:"Fintech / Eng",score:95,intros:19,avatar:"AP",color:"#A8C89A"},
];

const INIT_TARGETS = [
  {id:1,name:"Daniel Park",role:"CEO @ Mistral AI",domain:"AI / Research",avatar:"DP",color:"#C8A97E",visible:true,openFor:["Investissement","Partenariat"],bio:"Chercheur en IA, ouvert aux conversations stratégiques.",via:[1,3]},
  {id:2,name:"Lena Müller",role:"CFO @ N26",domain:"Fintech / Scale",avatar:"LM",color:"#B8A0D0",visible:true,openFor:["Recrutement","Conseil"],bio:"Ex-McKinsey, maintenant dans la finance produit.",via:[2]},
  {id:3,name:"James Osei",role:"Founder @ Paystack",domain:"Africa / Payments",avatar:"JO",color:"#E8A87C",visible:false,openFor:[],bio:"Infrastructure de paiement africaine.",via:[1,2,3]},
];

const INIT_NOTIFS = [
  {id:1,type:"req",from:"Claire Dubois",via:"Sophia Chen",context:"Partenariat commercial",time:"2h",requestType:"Partenariat",read:false,accepted:false},
  {id:2,type:"acc",target:"Daniel Park",via:"Marcus Leblanc",time:"5h",read:false},
  {id:3,type:"req",from:"Tom Laurent",via:"Anika Patel",context:"Opportunité d'investissement",time:"1j",requestType:"Investissement",read:true,accepted:false},
];

const REQUEST_TYPES = ["Investissement","Partenariat","Recrutement","Conseil","Business Dev","Expertise"];

function App() {
  const [screen,setScreen] = useState("home");
  const [tab,setTab] = useState("home");
  const [selConn,setSelConn] = useState(null);
  const [selTarget,setSelTarget] = useState(null);
  const [form,setForm] = useState({target:"",reason:"",connector:null,requestType:""});
  const [targets,setTargets] = useState(INIT_TARGETS);
  const [notifs,setNotifs] = useState(INIT_NOTIFS);
  const [myViz,setMyViz] = useState({visible:true,openFor:["Partenariat","Conseil"],bio:"Entrepreneur, cherche des connexions stratégiques."});

  const go = (sc,tb) => {setScreen(sc);if(tb)setTab(tb);};
  const unread = notifs.filter(n=>!n.read).length;
  const visibleTargets = targets.filter(t=>t.visible && t.openFor.length>0);

  const acceptNotif = id => setNotifs(ns=>ns.map(n=>n.id===id?{...n,accepted:true,read:true}:n));
  const declineNotif = id => setNotifs(ns=>ns.filter(n=>n.id!==id));

  return (
    <div style={S.shell}>
      <div style={S.phone}>
        {/* Status bar */}
        <div style={S.sbar}>
          <span style={{color:"#fff",fontSize:13,fontFamily:"monospace"}}>9:41</span>
          <div style={{width:100,height:16,background:"#0A0A0A",borderRadius:8,border:"1px solid #181818"}}/>
          <div style={{display:"flex",gap:3}}>{[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:"#333",display:"block"}}/>)}</div>
        </div>

        {/* Screen */}
        <div style={S.screen}>
          {screen==="home" && <HomeScreen go={go} notifs={notifs} visibleTargets={visibleTargets}/>}
          {screen==="match" && <MatchScreen targets={visibleTargets} connectors={CONNECTORS} onSel={t=>{setSelTarget(t);go("tprofile");}} />}
          {screen==="tprofile" && selTarget && <TargetProfile target={selTarget} connectors={CONNECTORS} onBack={()=>go("match","match")} onReq={()=>go("request","request")} />}
          {screen==="request" && <RequestScreen form={form} setForm={setForm} connectors={CONNECTORS} targets={visibleTargets} onSubmit={()=>go("confirm")} />}
          {screen==="confirm" && <ConfirmScreen onDone={()=>go("home","home")} />}
          {screen==="notifs" && <NotifsScreen notifs={notifs} onAccept={acceptNotif} onDecline={declineNotif} />}
          {screen==="myprofile" && <MyProfileScreen viz={myViz} go={go} />}
          {screen==="visibility" && <VisibilityScreen viz={myViz} setViz={setMyViz} onBack={()=>go("myprofile","myprofile")} />}
        </div>

        {/* Tab bar */}
        <div style={S.navbar}>
          {[
            {id:"home",label:"Accueil",icon:"⌂",sc:"home"},
            {id:"match",label:"Matching",icon:"◎",sc:"match"},
            {id:"notifs",label:"Alertes",icon:"◉",sc:"notifs",badge:unread},
            {id:"myprofile",label:"Profil",icon:"◈",sc:"myprofile"},
          ].map(t=>(
            <button key={t.id} style={{...S.navBtn,color:tab===t.id?"#C8A97E":"#444"}} onClick={()=>{setTab(t.id);go(t.sc,t.id);}}>
              <div style={{position:"relative",display:"inline-block"}}>
                <span style={{fontSize:18}}>{t.icon}</span>
                {t.badge>0 && <span style={{position:"absolute",top:-4,right:-8,background:"#E07070",color:"#fff",borderRadius:"50%",width:14,height:14,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"bold"}}>{t.badge}</span>}
              </div>
              <span style={{fontSize:9,letterSpacing:"0.06em",textTransform:"uppercase"}}>{t.label}</span>
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

function HomeScreen({go,notifs,visibleTargets}) {
  const unread = notifs.filter(n=>!n.read).length;
  return (
    <div style={S.page} className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:26}}>
        <div>
          <p style={{color:"#444",fontSize:11,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Bonjour, Alex</p>
          <h1 style={{color:"#fff",fontSize:34,fontFamily:"'Cormorant Garamond',serif",fontWeight:"400"}}>Relay</h1>
        </div>
        <button style={{width:36,height:36,borderRadius:"50%",background:"#C8A97E18",color:"#C8A97E",border:"none",cursor:"pointer",fontSize:13,fontWeight:"bold"}} onClick={()=>go("myprofile","myprofile")}>A</button>
      </div>

      <div style={{display:"flex",gap:10,marginBottom:26}}>
        {[
          {label:"Cibles opt-in",val:visibleTargets.length,color:"#C8A97E"},
          {label:"Alertes",val:unread,color:unread>0?"#E07070":"#333"},
          {label:"Relais",val:3,color:"#A8C89A"},
        ].map(st=>(
          <div key={st.label} style={{flex:1,background:"#111",border:"1px solid #1A1A1A",borderRadius:14,padding:"14px 10px",textAlign:"center"}}>
            <p style={{color:st.color,fontSize:22,fontFamily:"'Cormorant Garamond',serif",fontWeight:"600"}}>{st.val}</p>
            <p style={{color:"#3A3A3A",fontSize:9,textTransform:"uppercase",letterSpacing:"0.08em",marginTop:4}}>{st.label}</p>
          </div>
        ))}
      </div>

      <div style={{background:"linear-gradient(135deg,#1A1510,#111)",border:"1px solid #2A2015",borderRadius:18,padding:20,marginBottom:24}}>
        <p style={{color:"#C8A97E",fontSize:9,letterSpacing:"0.2em",textTransform:"uppercase",marginBottom:8}}>Accès de confiance</p>
        <p style={{color:"#888",fontSize:13,lineHeight:1.7,marginBottom:16}}>Les cibles ont choisi d'être accessibles. Demandez une introduction via un relais de confiance.</p>
        <div style={{display:"flex",gap:8}}>
          <button style={{...S.btnP,flex:1}} onClick={()=>go("match","match")}>Voir les cibles →</button>
          <button style={{...S.btnG,flex:1}} onClick={()=>go("request","request")}>Demander</button>
        </div>
      </div>

      {unread>0 && (
        <div>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
            <span style={{color:"#fff",fontSize:13}}>Notifications</span>
            <button style={{color:"#444",fontSize:10,background:"none",border:"none",cursor:"pointer"}} onClick={()=>go("notifs","notifs")}>Voir tout</button>
          </div>
          {notifs.filter(n=>!n.read).slice(0,2).map(n=>(
            <div key={n.id} style={{background:"#111",border:"1px solid #1A1A1A",borderLeft:"2px solid #C8A97E",borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#C8A97E",flexShrink:0}} className="pd"/>
              <div>
                <p style={{color:"#ccc",fontSize:12}}>{n.type==="req"?`${n.from} demande une intro via ${n.via}`:`Intro acceptée vers ${n.target}`}</p>
                <p style={{color:"#444",fontSize:10,marginTop:2}}>Il y a {n.time}</p>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MatchScreen({targets,connectors,onSel}) {
  const [filter,setFilter] = useState("Tous");
  const allTypes = ["Tous",...Array.from(new Set(targets.flatMap(t=>t.openFor)))];
  const filtered = filter==="Tous"?targets:targets.filter(t=>t.openFor.includes(filter));
  return (
    <div style={S.page} className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <h2 style={S.title}>Matching</h2>
      </div>
      <p style={{color:"#555",fontSize:12,marginBottom:16}}>Ces personnes ont choisi d'être accessibles via introduction.</p>
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:20}}>
        {allTypes.map(t=>(
          <button key={t} onClick={()=>setFilter(t)} style={{
            background:filter===t?"#C8A97E":"#111",color:filter===t?"#0A0A0A":"#555",
            border:filter===t?"none":"1px solid #1A1A1A",borderRadius:20,padding:"6px 14px",fontSize:11,whiteSpace:"nowrap",cursor:"pointer",flexShrink:0
          }}>{t}</button>
        ))}
      </div>
      {filtered.map(target=>{
        const tConns = connectors.filter(c=>target.via.includes(c.id));
        return (
          <button key={target.id} style={{...S.card,width:"100%",textAlign:"left",marginBottom:10,display:"block"}} onClick={()=>onSel(target)}>
            <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
              <div style={{width:44,height:44,borderRadius:"50%",background:target.color+"22",color:target.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:"bold",flexShrink:0}}>{target.avatar}</div>
              <div style={{flex:1}}>
                <p style={{color:"#fff",fontSize:14,marginBottom:2}}>{target.name}</p>
                <p style={{color:"#555",fontSize:11,marginBottom:8}}>{target.role}</p>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:8}}>
                  {target.openFor.map(type=>(
                    <span key={type} style={{background:"#C8A97E15",color:"#C8A97E",fontSize:9,padding:"3px 8px",borderRadius:20}}>{type}</span>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:"#333",fontSize:10}}>Via :</span>
                  {tConns.map(c=>(
                    <span key={c.id} style={{background:c.color+"18",color:c.color,fontSize:10,padding:"2px 8px",borderRadius:20}}>{c.name.split(" ")[0]}</span>
                  ))}
                </div>
              </div>
              <span style={{color:"#333",fontSize:18}}>›</span>
            </div>
          </button>
        );
      })}
      {filtered.length===0 && <div style={{textAlign:"center",padding:"40px 0",color:"#333"}}><p style={{fontSize:32,marginBottom:12}}>◎</p><p style={{fontSize:13}}>Aucune cible pour ce filtre</p></div>}
    </div>
  );
}

function TargetProfile({target,connectors,onBack,onReq}) {
  const tConns = connectors.filter(c=>target.via.includes(c.id));
  return (
    <div style={S.page} className="fu">
      <button style={S.back} onClick={onBack}>← Retour</button>
      <div style={{textAlign:"center",marginBottom:26}}>
        <div style={{width:72,height:72,borderRadius:"50%",background:target.color+"22",color:target.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:24,fontWeight:"bold",margin:"0 auto 14px"}}>{target.avatar}</div>
        <h2 style={{...S.title,marginBottom:4}}>{target.name}</h2>
        <p style={{color:"#777",fontSize:13,marginBottom:4}}>{target.role}</p>
        <p style={{color:"#444",fontSize:11}}>{target.domain}</p>
      </div>
      <div style={{...S.card,marginBottom:12}}>
        <p style={S.clabel}>À propos</p>
        <p style={{color:"#aaa",fontSize:13,lineHeight:1.7,marginTop:8}}>{target.bio}</p>
      </div>
      <div style={{...S.card,marginBottom:12}}>
        <p style={S.clabel}>Ouvert pour</p>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:10}}>
          {target.openFor.map(type=>(
            <span key={type} style={{background:"#C8A97E18",color:"#C8A97E",fontSize:11,padding:"5px 12px",borderRadius:20}}>{type}</span>
          ))}
        </div>
      </div>
      <div style={{...S.card,marginBottom:24}}>
        <p style={S.clabel}>Accessible via</p>
        {tConns.map(c=>(
          <div key={c.id} style={{display:"flex",alignItems:"center",gap:10,marginTop:12}}>
            <div style={{width:34,height:34,borderRadius:"50%",background:c.color+"22",color:c.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:"bold"}}>{c.avatar}</div>
            <div style={{flex:1}}>
              <p style={{color:"#ccc",fontSize:12}}>{c.name}</p>
              <p style={{color:"#444",fontSize:10}}>{c.role}</p>
            </div>
            <span style={{background:"#A8C89A18",color:"#A8C89A",fontSize:9,padding:"3px 8px",borderRadius:20}}>Score {c.score}</span>
          </div>
        ))}
      </div>
      <button style={S.btnP} onClick={onReq}>Demander une introduction →</button>
    </div>
  );
}

function RequestScreen({form,setForm,connectors,targets,onSubmit}) {
  const [step,setStep] = useState(1);
  return (
    <div style={S.page} className="fu">
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
        <h2 style={S.title}>Nouvelle demande</h2>
        <div style={{display:"flex",gap:6}}>{[1,2,3].map(i=><div key={i} style={{width:8,height:8,borderRadius:"50%",background:step>=i?"#C8A97E":"#1E1E1E"}}/>)}</div>
      </div>
      {step===1 && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <p style={S.label}>Qui voulez-vous contacter ?</p>
          {targets.map(t=>(
            <button key={t.id} onClick={()=>setForm({...form,target:t.name})} style={{...S.card,textAlign:"left",border:form.target===t.name?"1px solid #C8A97E":"1px solid #1A1A1A",display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:36,height:36,borderRadius:"50%",background:t.color+"22",color:t.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:"bold"}}>{t.avatar}</div>
              <div style={{flex:1}}>
                <p style={{color:"#fff",fontSize:13}}>{t.name}</p>
                <p style={{color:"#555",fontSize:10}}>{t.role}</p>
              </div>
              {form.target===t.name && <span style={{color:"#C8A97E"}}>✓</span>}
            </button>
          ))}
          <input style={S.input} placeholder="Ou entrez un nom manuellement..." value={form.target} onChange={e=>setForm({...form,target:e.target.value})} />
          <p style={S.label}>Type de demande</p>
          <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
            {REQUEST_TYPES.map(type=>(
              <button key={type} onClick={()=>setForm({...form,requestType:type})} style={{
                background:form.requestType===type?"#C8A97E":"#141414",color:form.requestType===type?"#0A0A0A":"#555",
                border:form.requestType===type?"none":"1px solid #1E1E1E",borderRadius:20,padding:"6px 14px",fontSize:11,cursor:"pointer"
              }}>{type}</button>
            ))}
          </div>
          <button style={S.btnP} onClick={()=>setStep(2)}>Continuer →</button>
        </div>
      )}
      {step===2 && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <p style={S.label}>Choisir un relais</p>
          {connectors.map(c=>(
            <button key={c.id} style={{...S.card,border:form.connector===c.id?`1px solid ${c.color}`:"1px solid #1A1A1A",display:"flex",alignItems:"center",gap:10,width:"100%",textAlign:"left"}} onClick={()=>setForm({...form,connector:c.id})}>
              <div style={{width:40,height:40,borderRadius:"50%",background:c.color+"22",color:c.color,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,fontWeight:"bold"}}>{c.avatar}</div>
              <div style={{flex:1}}>
                <p style={{color:"#fff",fontSize:13}}>{c.name}</p>
                <p style={{color:"#555",fontSize:11}}>{c.role}</p>
              </div>
              <span style={{color:c.color,fontSize:18,fontFamily:"'Cormorant Garamond',serif",fontWeight:"600"}}>{c.score}</span>
            </button>
          ))}
          <button style={S.btnP} onClick={()=>setStep(3)}>Continuer →</button>
        </div>
      )}
      {step===3 && (
        <div style={{display:"flex",flexDirection:"column",gap:12}}>
          <p style={S.label}>Message au relais</p>
          <textarea style={{...S.input,height:100,resize:"none"}} placeholder="Pourquoi cette introduction a de la valeur..." value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})} />
          <div style={S.card}>
            <p style={S.clabel}>Récapitulatif</p>
            <p style={{color:"#aaa",fontSize:12,marginTop:8}}>🎯 {form.target||"—"}</p>
            <p style={{color:"#aaa",fontSize:12,marginTop:4}}>◈ {form.requestType||"—"}</p>
            <p style={{color:"#aaa",fontSize:12,marginTop:4}}>⇢ {form.connector?connectors.find(c=>c.id===form.connector)?.name:"—"}</p>
          </div>
          <button style={S.btnP} onClick={onSubmit}>Envoyer la demande</button>
        </div>
      )}
    </div>
  );
}

function NotifsScreen({notifs,onAccept,onDecline}) {
  const [filter,setFilter] = useState("all");
  const filtered = filter==="req"?notifs.filter(n=>n.type==="req"):notifs;
  return (
    <div style={S.page} className="fu">
      <h2 style={{...S.title,marginBottom:16}}>Notifications</h2>
      <div style={{display:"flex",gap:8,marginBottom:20}}>
        {[{id:"all",label:"Toutes"},{id:"req",label:"Demandes"}].map(t=>(
          <button key={t.id} onClick={()=>setFilter(t.id)} style={{
            background:filter===t.id?"#C8A97E":"#111",color:filter===t.id?"#0A0A0A":"#555",
            border:filter===t.id?"none":"1px solid #1A1A1A",borderRadius:20,padding:"6px 14px",fontSize:11,cursor:"pointer"
          }}>{t.label}</button>
        ))}
      </div>
      {filtered.map(n=>(
        <div key={n.id} style={{...S.card,marginBottom:10,borderLeft:`2px solid ${n.read?"#1A1A1A":"#C8A97E"}`}}>
          {n.type==="req" ? (
            <div>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <p style={{color:"#fff",fontSize:13}}><span style={{color:"#C8A97E"}}>{n.from}</span> demande une intro</p>
                <span style={{color:"#444",fontSize:10}}>Il y a {n.time}</span>
              </div>
              <p style={{color:"#555",fontSize:11,marginBottom:4}}>Via <span style={{color:"#aaa"}}>{n.via}</span></p>
              <p style={{color:"#555",fontSize:11,marginBottom:10}}>Contexte : <span style={{color:"#aaa"}}>{n.context}</span></p>
              <span style={{background:"#C8A97E15",color:"#C8A97E",fontSize:9,padding:"3px 10px",borderRadius:20}}>{n.requestType}</span>
              {!n.accepted ? (
                <div style={{display:"flex",gap:8,marginTop:12}}>
                  <button style={{...S.btnP,flex:1,padding:"9px",fontSize:12}} onClick={()=>onAccept(n.id)}>Accepter</button>
                  <button style={{...S.btnG,flex:1,padding:"9px",fontSize:12}} onClick={()=>onDecline(n.id)}>Refuser</button>
                </div>
              ) : <p style={{color:"#A8C89A",fontSize:11,marginTop:10}}>✓ Introduction acceptée</p>}
            </div>
          ) : (
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <p style={{color:"#fff",fontSize:13,marginBottom:4}}>Intro vers <span style={{color:"#C8A97E"}}>{n.target}</span> acceptée</p>
                <p style={{color:"#555",fontSize:11}}>Via {n.via} · Il y a {n.time}</p>
              </div>
              <span style={{background:"#A8C89A18",color:"#A8C89A",fontSize:10,padding:"3px 10px",borderRadius:20}}>✓</span>
            </div>
          )}
        </div>
      ))}
    </div>
  );
}

function MyProfileScreen({viz,go}) {
  return (
    <div style={S.page} className="fu">
      <h2 style={{...S.title,marginBottom:20}}>Mon profil</h2>
      <div style={{...S.card,marginBottom:12,textAlign:"center"}}>
        <div style={{width:60,height:60,borderRadius:"50%",background:"#C8A97E22",color:"#C8A97E",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,fontWeight:"bold",margin:"0 auto 12px"}}>A</div>
        <p style={{color:"#fff",fontSize:16,marginBottom:4}}>Alexandre Martin</p>
        <p style={{color:"#555",fontSize:12,marginBottom:12}}>Entrepreneur · Paris</p>
        <p style={{color:"#777",fontSize:12,lineHeight:1.6}}>{viz.bio}</p>
      </div>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:viz.visible?12:0}}>
          <p style={S.clabel}>Visibilité</p>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:7,height:7,borderRadius:"50%",background:viz.visible?"#A8C89A":"#444"}} className={viz.visible?"pd":""}/>
            <span style={{color:viz.visible?"#A8C89A":"#444",fontSize:11}}>{viz.visible?"Accessible":"Masqué"}</span>
          </div>
        </div>
        {viz.visible && (
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {viz.openFor.map(t=><span key={t} style={{background:"#C8A97E15",color:"#C8A97E",fontSize:10,padding:"3px 10px",borderRadius:20}}>{t}</span>)}
          </div>
        )}
      </div>
      <button style={{...S.btnP,marginBottom:10}} onClick={()=>go("visibility")}>Gérer ma visibilité →</button>
      <button style={S.btnG} onClick={()=>go("notifs","notifs")}>Voir mes notifications</button>
    </div>
  );
}

function VisibilityScreen({viz,setViz,onBack}) {
  const [local,setLocal] = useState({...viz});
  const toggle = type => setLocal(v=>({...v,openFor:v.openFor.includes(type)?v.openFor.filter(t=>t!==type):[...v.openFor,type]}));
  const save = () => {setViz(local);onBack();};
  return (
    <div style={S.page} className="fu">
      <button style={S.back} onClick={onBack}>← Retour</button>
      <h2 style={{...S.title,marginBottom:6}}>Ma visibilité</h2>
      <p style={{color:"#555",fontSize:12,marginBottom:22}}>Contrôlez comment vous pouvez être contacté via Relay.</p>
      <div style={{...S.card,marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <p style={{color:"#fff",fontSize:13,marginBottom:4}}>Accessible via introduction</p>
            <p style={{color:"#444",fontSize:11}}>Les autres peuvent demander une intro vers vous</p>
          </div>
          <button onClick={()=>setLocal(v=>({...v,visible:!v.visible}))} style={{width:44,height:24,borderRadius:12,background:local.visible?"#C8A97E":"#222",border:"none",cursor:"pointer",position:"relative",flexShrink:0,transition:"background 0.2s"}}>
            <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:local.visible?23:3,transition:"left 0.2s"}}/>
          </button>
        </div>
      </div>
      {local.visible && (
        <>
          <div style={{...S.card,marginBottom:12}}>
            <p style={S.clabel}>Ouvert pour</p>
            <p style={{color:"#444",fontSize:11,marginBottom:12,marginTop:4}}>Types de demandes acceptées</p>
            <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
              {REQUEST_TYPES.map(type=>{
                const on=local.openFor.includes(type);
                return <button key={type} onClick={()=>toggle(type)} style={{background:on?"#C8A97E":"#141414",color:on?"#0A0A0A":"#555",border:on?"none":"1px solid #1E1E1E",borderRadius:20,padding:"7px 14px",fontSize:11,cursor:"pointer"}}>{type}</button>;
              })}
            </div>
          </div>
          <div style={{...S.card,marginBottom:22}}>
            <p style={S.clabel}>Bio visible</p>
            <textarea style={{...S.input,height:80,resize:"none",marginTop:8}} value={local.bio} onChange={e=>setLocal(v=>({...v,bio:e.target.value}))} placeholder="Ce que les autres verront..." />
          </div>
        </>
      )}
      <button style={S.btnP} onClick={save}>Enregistrer →</button>
    </div>
  );
}

function ConfirmScreen({onDone}) {
  return (
    <div style={{...S.page,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"85%"}} className="fu">
      <div style={{width:80,height:80,borderRadius:"50%",background:"#C8A97E15",color:"#C8A97E",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,marginBottom:20}}>⇢</div>
      <h2 style={{...S.title,marginBottom:12,textAlign:"center"}}>Demande envoyée</h2>
      <p style={{color:"#666",fontSize:13,lineHeight:1.8,textAlign:"center",maxWidth:260,marginBottom:24}}>Votre demande a été transmise. La cible sera notifiée si l'introduction est acceptée par le relais.</p>
      <div style={{background:"#111",border:"1px solid #1A1A1A",borderRadius:20,padding:"6px 16px",color:"#333",fontSize:10,letterSpacing:"0.1em",marginBottom:32}}>Consentement · Traçabilité · Confiance</div>
      <button style={S.btnP} onClick={onDone}>Retour à l'accueil</button>
    </div>
  );
}

const S = {
  shell:{minHeight:"100vh",background:"#050505",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'DM Sans',sans-serif"},
  phone:{width:375,height:812,background:"#0A0A0A",borderRadius:44,border:"1px solid #151515",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 50px 150px rgba(0,0,0,0.9)"},
  sbar:{height:44,padding:"0 24px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0},
  screen:{flex:1,overflowY:"auto",overflowX:"hidden"},
  navbar:{height:78,background:"#0D0D0D",borderTop:"1px solid #141414",display:"flex",flexShrink:0},
  navBtn:{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4},
  page:{padding:"22px 20px 20px"},
  title:{color:"#fff",fontSize:22,fontFamily:"'Cormorant Garamond',serif",fontWeight:"500",margin:0},
  card:{background:"#111",border:"1px solid #1A1A1A",borderRadius:14,padding:"14px",cursor:"pointer"},
  clabel:{color:"#333",fontSize:9,textTransform:"uppercase",letterSpacing:"0.1em"},
  label:{color:"#444",fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em"},
  btnP:{background:"#C8A97E",color:"#080808",border:"none",borderRadius:12,padding:"13px 20px",fontSize:13,fontWeight:"500",cursor:"pointer",width:"100%"},
  btnG:{background:"none",color:"#C8A97E",border:"1px solid #C8A97E30",borderRadius:12,padding:"13px 20px",fontSize:13,cursor:"pointer",width:"100%"},
  back:{background:"none",border:"none",color:"#C8A97E",cursor:"pointer",fontSize:12,padding:0,marginBottom:20},
  input:{background:"#141414",border:"1px solid #1E1E1E",borderRadius:10,padding:"12px 14px",color:"#fff",fontSize:13,fontFamily:"'DM Sans',sans-serif",width:"100%",boxSizing:"border-box"},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
