<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Relay</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0B0F1A;font-family:'Inter',sans-serif;}
::-webkit-scrollbar{width:0;}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(59,130,246,0.3);}50%{box-shadow:0 0 40px rgba(59,130,246,0.6);}}
.fu{animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) forwards;}
.glow{animation:glow 3s ease-in-out infinite;}
input:focus,textarea:focus{border-color:#3B82F6!important;outline:none;box-shadow:0 0 0 3px rgba(59,130,246,0.15)!important;}
button{transition:all 0.15s ease;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const SUPABASE_URL = "https://jgxhkrfojgykriowxfxy.supabase.co";
const SUPABASE_KEY = "sb_publishable_5PaqcpOnM6ULZHgj0NN1Pw_kRdGRXyO";
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const {useState} = React;

const REQ_TYPES = ["Investment","Partnership","Hiring","Advisory","Business Dev","Expertise"];

// Helper: get initials from name
const getInitials = name => name.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();

function App() {
  const {useState, useEffect} = React;
  const [screen,setScreen] = useState("landing");
  const [tab,setTab] = useState("home");
  const [selConn,setSelConn] = useState(null);
  const [selTarget,setSelTarget] = useState(null);
  const [form,setForm] = useState({target:"",reason:"",connector:null,rtype:""});
  const [notifs,setNotifs] = useState([]);
  const [connectors,setConnectors] = useState([]);
  const [targets,setTargets] = useState([]);
  const [loading,setLoading] = useState(true);
  const [myViz,setMyViz] = useState({visible:true,openFor:["Partnership","Advisory"],bio:"Entrepreneur seeking strategic connections."});

  useEffect(()=>{
    async function loadData() {
      setLoading(true);
      try {
        const [connRes, targRes] = await Promise.all([
          sb.from("connectors").select("*").order("score", {ascending:false}),
          sb.from("targets").select("*").eq("visible", true),
        ]);
        if(connRes.data) setConnectors(connRes.data.map(c=>({...c, initials:getInitials(c.name), avatar:getInitials(c.name), acc:c.accept_rate, intros:c.intros_count})));
        if(targRes.data) setTargets(targRes.data.map(t=>({...t, openFor:t.open_for||[], via:[], avatar:getInitials(t.name)})));
      } catch(e) { console.error(e); }
      setLoading(false);
    }
    loadData();
  }, []);

  const visibleTargets = targets.filter(t=>t.visible&&t.openFor&&t.openFor.length>0);
  const unread = notifs.filter(n=>!n.read).length;
  const go=(sc,tb)=>{setScreen(sc);if(tb)setTab(tb);};
  const acceptN=id=>setNotifs(ns=>ns.map(n=>n.id===id?{...n,accepted:true,read:true}:n));
  const declineN=id=>setNotifs(ns=>ns.filter(n=>n.id!==id));

  if(loading) return (
    <div style={{minHeight:"100%",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,background:"#0B0F1A"}}>
      <div style={{width:32,height:32,background:"#3B82F6",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center"}}>
        <svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <p style={{color:"rgba(255,255,255,0.4)",fontSize:13,fontWeight:"500"}}>Loading Relay...</p>
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"#060912",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Inter',sans-serif"}}>
      <div style={{width:390,height:844,background:"#0B0F1A",borderRadius:48,border:"1px solid rgba(255,255,255,0.06)",overflow:"hidden",display:"flex",flexDirection:"column",boxShadow:"0 60px 200px rgba(0,0,0,0.95), inset 0 1px 0 rgba(255,255,255,0.05)",position:"relative"}}>
        {/* Status bar */}
        <div style={{height:48,padding:"0 28px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,background:"transparent"}}>
          <span style={{color:"rgba(255,255,255,0.9)",fontSize:14,fontWeight:"600",letterSpacing:"-0.02em"}}>9:41</span>
          <div style={{width:120,height:20,background:"#0B0F1A",borderRadius:10,border:"1px solid rgba(255,255,255,0.08)"}}/>
          <div style={{display:"flex",gap:4,alignItems:"center"}}>
            {[0,1,2].map(i=><span key={i} style={{width:5,height:5,borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"block"}}/>)}
          </div>
        </div>

        {/* Screen content */}
        <div style={{flex:1,overflowY:"auto",overflowX:"hidden"}}>
          {screen==="landing" && <LandingScreen go={go}/>}
          {screen==="home" && <HomeScreen go={go} notifs={notifs} visibleTargets={visibleTargets}/>}
          {screen==="match" && <MatchScreen targets={visibleTargets} connectors={connectors} onSel={t=>{setSelTarget(t);go("tprofile");}}/>}
          {screen==="tprofile" && selTarget && <TargetProfile target={selTarget} connectors={connectors} onBack={()=>go("match","match")} onReq={()=>go("request","request")}/>}
          {screen==="request" && <RequestScreen form={form} setForm={setForm} connectors={connectors} targets={visibleTargets} onSubmit={async()=>{
            // Save request to Supabase
            await sb.from("requests").insert({
              target_name: form.target,
              connector_id: form.connector,
              request_type: form.rtype,
              message: form.reason,
              status: "pending"
            });
            go("confirm");
          }}/>}
          {screen==="confirm" && <ConfirmScreen onDone={()=>go("home","home")}/>}
          {screen==="notifs" && <NotifsScreen notifs={notifs} onAccept={acceptN} onDecline={declineN}/>}
          {screen==="myprofile" && <MyProfileScreen viz={myViz} go={go}/>}
          {screen==="visibility" && <VisibilityScreen viz={myViz} setViz={setMyViz} onBack={()=>go("myprofile","myprofile")}/>}
          {screen==="connectors" && <ConnectorsScreen connectors={connectors} onSel={c=>{setSelConn(c);go("cprofile");}}/>}
          {screen==="cprofile" && selConn && <ConnectorProfile connector={selConn} onBack={()=>go("connectors")} onReq={()=>go("request","request")}/>}
        </div>

        {/* Tab bar — hide on landing */}
        {screen!=="landing" && (
          <div style={{height:82,background:"rgba(11,15,26,0.95)",borderTop:"1px solid rgba(255,255,255,0.06)",display:"flex",flexShrink:0,backdropFilter:"blur(20px)"}}>
            {[
              {id:"home",label:"Home",icon:<HomeIcon/>,sc:"home"},
              {id:"match",label:"Discover",icon:<DiscoverIcon/>,sc:"match"},
              {id:"notifs",label:"Alerts",icon:<AlertIcon/>,sc:"notifs",badge:unread},
              {id:"myprofile",label:"Profile",icon:<ProfileIcon/>,sc:"myprofile"},
            ].map(t=>(
              <button key={t.id} onClick={()=>{setTab(t.id);go(t.sc,t.id);}} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5,color:tab===t.id?"#3B82F6":"rgba(255,255,255,0.3)",transition:"color 0.2s",position:"relative"}}>
                <div style={{position:"relative"}}>
                  {t.icon}
                  {t.badge>0&&<span style={{position:"absolute",top:-5,right:-8,background:"#EF4444",color:"#fff",borderRadius:"50%",width:15,height:15,fontSize:8,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"700"}}>{t.badge}</span>}
                </div>
                <span style={{fontSize:9,letterSpacing:"0.04em",fontWeight:"500"}}>{t.label}</span>
                {tab===t.id&&<div style={{position:"absolute",bottom:0,width:20,height:2,background:"#3B82F6",borderRadius:2}}/>}
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ── ICONS ──────────────────────────────────────────────────
const HomeIcon=()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
const DiscoverIcon=()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
const AlertIcon=()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>;
const ProfileIcon=()=><svg width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>;
const ChevronRight=()=><svg width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>;
const CheckIcon=()=><svg width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>;

// ── LANDING ────────────────────────────────────────────────
function LandingScreen({go}) {
  return (
    <div style={{minHeight:"100%",background:"linear-gradient(180deg,#0B0F1A 0%,#0D1428 50%,#0B0F1A 100%)",position:"relative",overflow:"hidden"}}>
      {/* BG glow */}
      <div style={{position:"absolute",top:-100,left:-100,width:400,height:400,background:"radial-gradient(circle,rgba(59,130,246,0.12) 0%,transparent 70%)",pointerEvents:"none"}}/>
      <div style={{position:"absolute",bottom:-50,right:-80,width:300,height:300,background:"radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 70%)",pointerEvents:"none"}}/>

      <div style={{padding:"60px 28px 40px",position:"relative"}}>
        {/* Logo */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:64}}>
          <div style={{width:28,height:28,background:"#3B82F6",borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="16" height="16" fill="white" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <span style={{color:"#fff",fontSize:16,fontWeight:"700",letterSpacing:"-0.02em"}}>RELAY</span>
          <span style={{marginLeft:"auto",color:"rgba(255,255,255,0.4)",fontSize:12,fontWeight:"500",border:"1px solid rgba(255,255,255,0.1)",borderRadius:20,padding:"4px 10px"}}>Sign In</span>
        </div>

        {/* Badge */}
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(59,130,246,0.12)",border:"1px solid rgba(59,130,246,0.25)",borderRadius:20,padding:"5px 12px",marginBottom:24}}>
          <div style={{width:6,height:6,borderRadius:"50%",background:"#3B82F6"}}/>
          <span style={{color:"#3B82F6",fontSize:11,fontWeight:"600",letterSpacing:"0.05em",textTransform:"uppercase"}}>By invitation only</span>
        </div>

        {/* Hero */}
        <h1 style={{color:"#fff",fontSize:40,fontWeight:"800",lineHeight:1.1,letterSpacing:"-0.03em",marginBottom:20}}>
          Unlock the right<br/><span style={{color:"#3B82F6"}}>introduction.</span>
        </h1>
        <p style={{color:"rgba(255,255,255,0.5)",fontSize:15,lineHeight:1.7,marginBottom:40}}>
          Relay enables you to reach decision-makers through trusted intermediaries — not cold outreach. Secure, private, and institutional.
        </p>

        {/* Stats */}
        <div style={{display:"flex",gap:12,marginBottom:40}}>
          {[{val:"2.4k",label:"Connectors"},{val:"94%",label:"Accept rate"},{val:"48h",label:"Avg. delivery"}].map(st=>(
            <div key={st.label} style={{flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:"14px 10px",textAlign:"center"}}>
              <p style={{color:"#fff",fontSize:20,fontWeight:"700",letterSpacing:"-0.03em"}}>{st.val}</p>
              <p style={{color:"rgba(255,255,255,0.35)",fontSize:10,marginTop:4,textTransform:"uppercase",letterSpacing:"0.06em"}}>{st.label}</p>
            </div>
          ))}
        </div>

        <button className="glow" onClick={()=>go("home","home")} style={{width:"100%",background:"#3B82F6",color:"#fff",border:"none",borderRadius:14,padding:"16px",fontSize:15,fontWeight:"700",cursor:"pointer",letterSpacing:"-0.01em",marginBottom:12}}>
          Request an Introduction →
        </button>
        <button onClick={()=>go("match","match")} style={{width:"100%",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.6)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:14,padding:"16px",fontSize:15,fontWeight:"500",cursor:"pointer"}}>
          Learn More
        </button>
      </div>
    </div>
  );
}

// ── HOME ───────────────────────────────────────────────────
function HomeScreen({go,notifs,visibleTargets}) {
  const unread=notifs.filter(n=>!n.read).length;
  return (
    <div style={{padding:"24px 20px 20px"}} className="fu">
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:28}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:24,height:24,background:"#3B82F6",borderRadius:7,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="13" height="13" fill="white" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
          </div>
          <span style={{color:"#fff",fontSize:15,fontWeight:"700",letterSpacing:"-0.02em"}}>RELAY</span>
        </div>
        <button onClick={()=>go("myprofile","myprofile")} style={{width:36,height:36,borderRadius:"50%",background:"linear-gradient(135deg,#3B82F6,#6366F1)",border:"none",cursor:"pointer",color:"#fff",fontSize:13,fontWeight:"700"}}>A</button>
      </div>

      {/* Greeting */}
      <div style={{marginBottom:24}}>
        <p style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginBottom:4,fontWeight:"500"}}>Good morning,</p>
        <h2 style={{color:"#fff",fontSize:26,fontWeight:"800",letterSpacing:"-0.03em"}}>Alexandre</h2>
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:24}}>
        {[
          {label:"Opt-in targets",val:visibleTargets.length,color:"#3B82F6"},
          {label:"Unread",val:unread,color:unread>0?"#EF4444":"rgba(255,255,255,0.2)"},
          {label:"Connectors",val:3,color:"#10B981"},
        ].map(st=>(
          <div key={st.label} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:"16px 12px",textAlign:"center"}}>
            <p style={{color:st.color,fontSize:24,fontWeight:"800",letterSpacing:"-0.03em"}}>{st.val}</p>
            <p style={{color:"rgba(255,255,255,0.3)",fontSize:9,marginTop:4,textTransform:"uppercase",letterSpacing:"0.06em",lineHeight:1.3}}>{st.label}</p>
          </div>
        ))}
      </div>

      {/* CTA */}
      <div style={{background:"linear-gradient(135deg,rgba(59,130,246,0.15),rgba(99,102,241,0.1))",border:"1px solid rgba(59,130,246,0.2)",borderRadius:18,padding:20,marginBottom:24}}>
        <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(59,130,246,0.15)",borderRadius:20,padding:"4px 10px",marginBottom:12}}>
          <div style={{width:5,height:5,borderRadius:"50%",background:"#3B82F6"}}/>
          <span style={{color:"#3B82F6",fontSize:10,fontWeight:"600",letterSpacing:"0.06em",textTransform:"uppercase"}}>Trusted access</span>
        </div>
        <p style={{color:"rgba(255,255,255,0.7)",fontSize:13,lineHeight:1.7,marginBottom:16}}>Targets have chosen to be reachable. Request a warm introduction through a trusted connector.</p>
        <div style={{display:"flex",gap:8}}>
          <button style={Btn.primary} onClick={()=>go("match","match")}>Discover targets →</button>
          <button style={Btn.ghost} onClick={()=>go("request","request")}>Request intro</button>
        </div>
      </div>

      {/* Recent notifs */}
      {unread>0&&(
        <div>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <span style={{color:"#fff",fontSize:14,fontWeight:"600"}}>Recent alerts</span>
            <button style={{color:"#3B82F6",fontSize:11,background:"none",border:"none",cursor:"pointer",fontWeight:"500"}} onClick={()=>go("notifs","notifs")}>View all</button>
          </div>
          {notifs.filter(n=>!n.read).slice(0,2).map(n=>(
            <div key={n.id} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderLeft:"3px solid #3B82F6",borderRadius:12,padding:"12px 14px",marginBottom:8,display:"flex",gap:10,alignItems:"center"}}>
              <div style={{width:7,height:7,borderRadius:"50%",background:"#3B82F6",flexShrink:0}}/>
              <div style={{flex:1}}>
                <p style={{color:"rgba(255,255,255,0.8)",fontSize:12,fontWeight:"500"}}>{n.type==="req"?`${n.from} requests an intro via ${n.via}`:`Intro to ${n.target} accepted`}</p>
                <p style={{color:"rgba(255,255,255,0.25)",fontSize:10,marginTop:2}}>{n.time} ago</p>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── MATCH / DISCOVER ───────────────────────────────────────
function MatchScreen({targets,connectors,onSel}) {
  const [filter,setFilter]=useState("All");
  const allTypes=["All",...Array.from(new Set(targets.flatMap(t=>t.openFor)))];
  const filtered=filter==="All"?targets:targets.filter(t=>t.openFor.includes(filter));
  return (
    <div style={{padding:"24px 20px 20px"}} className="fu">
      <h2 style={T.pageTitle}>Discover</h2>
      <p style={{color:"rgba(255,255,255,0.35)",fontSize:12,marginBottom:18,fontWeight:"400"}}>People who chose to be reachable via introduction.</p>
      {/* Filter */}
      <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:4,marginBottom:20}}>
        {allTypes.map(type=>(
          <button key={type} onClick={()=>setFilter(type)} style={{
            background:filter===type?"#3B82F6":"rgba(255,255,255,0.05)",
            color:filter===type?"#fff":"rgba(255,255,255,0.4)",
            border:filter===type?"none":"1px solid rgba(255,255,255,0.07)",
            borderRadius:20,padding:"6px 14px",fontSize:11,fontWeight:"600",whiteSpace:"nowrap",cursor:"pointer",flexShrink:0
          }}>{type}</button>
        ))}
      </div>
      {filtered.map(target=>{
        const tc=connectors.filter(c=>target.via.includes(c.id));
        return (
          <button key={target.id} onClick={()=>onSel(target)} style={{width:"100%",textAlign:"left",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:18,padding:16,marginBottom:10,cursor:"pointer",display:"block"}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
              <div style={{width:46,height:46,borderRadius:14,background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:"700",color:"#fff",flexShrink:0}}>{target.avatar}</div>
              <div style={{flex:1}}>
                <p style={{color:"#fff",fontSize:15,fontWeight:"700",letterSpacing:"-0.02em",marginBottom:2}}>{target.name}</p>
                <p style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginBottom:10}}>{target.role}</p>
                <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
                  {target.openFor.map(type=>(
                    <span key={type} style={{background:"rgba(59,130,246,0.15)",color:"#60A5FA",fontSize:10,padding:"3px 9px",borderRadius:20,fontWeight:"600"}}>{type}</span>
                  ))}
                </div>
                <div style={{display:"flex",alignItems:"center",gap:6}}>
                  <span style={{color:"rgba(255,255,255,0.25)",fontSize:10,fontWeight:"500"}}>Via</span>
                  {tc.map(c=>(
                    <div key={c.id} style={{display:"flex",alignItems:"center",gap:4,background:"rgba(255,255,255,0.06)",borderRadius:20,padding:"2px 8px"}}>
                      <div style={{width:14,height:14,borderRadius:"50%",background:"#2563EB",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:"700",color:"#fff"}}>{c.initials[0]}</div>
                      <span style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:"500"}}>{c.name.split(" ")[0]}</span>
                    </div>
                  ))}
                </div>
              </div>
              <div style={{color:"rgba(255,255,255,0.2)",marginTop:2}}><ChevronRight/></div>
            </div>
          </button>
        );
      })}
    </div>
  );
}

// ── TARGET PROFILE ─────────────────────────────────────────
function TargetProfile({target,connectors,onBack,onReq}) {
  const tc=connectors.filter(c=>target.via.includes(c.id));
  return (
    <div style={{padding:"24px 20px 20px"}} className="fu">
      <button style={Btn.back} onClick={onBack}>← Back</button>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{width:80,height:80,borderRadius:24,background:"linear-gradient(135deg,#1E3A5F,#2563EB)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:"700",color:"#fff",margin:"0 auto 16px"}}>{target.avatar}</div>
